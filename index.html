<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOS | Soluciones Estratégicas</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ff5a81">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --pink: #ff5a81; 
            --dark: #0a0a0a; 
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; background: var(--dark); color: #fff;
            font-family: 'Inter', sans-serif; scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* --- HERO CON AURA ANIMADA --- */
        .hero {
            height: 60vh; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; text-align: center;
        }
        .hero::before {
            content: ''; position: absolute; width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(255, 90, 129, 0.15) 0%, transparent 50%);
            animation: moveAura 12s infinite alternate; z-index: 1;
        }
        @keyframes moveAura { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        /* --- LOGO CORREGIDO --- */
        .logo-main {
            width: 130px; height: 130px; background: var(--pink); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;
            box-shadow: 0 0 50px rgba(255, 90, 129, 0.6); border: 4px solid #fff;
            animation: float 5s ease-in-out infinite; z-index: 2; position: relative;
        }
        .logo-main img { width: 65%; height: auto; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* --- SECCIÓN DE SELECCIÓN --- */
        .services-section { padding: 40px 20px; text-align: center; }
        .grid-12 {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px; max-width: 1100px; margin: 30px auto;
        }

        .service-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.08);
            padding: 25px 10px; border-radius: 22px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; backdrop-filter: blur(5px);
        }
        .service-card.selected {
            border-color: var(--pink); background: rgba(255, 90, 129, 0.15);
            transform: scale(1.08); box-shadow: 0 10px 20px rgba(255, 90, 129, 0.2);
        }
        .service-card h4 { font-size: 0.75rem; margin: 0; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
        
        .counter-badge {
            background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 30px;
            font-size: 0.85rem; color: var(--pink); border: 1px solid var(--pink);
            display: inline-block; margin-bottom: 20px; font-weight: bold;
        }

        /* --- WHATSAPP FLOTANTE --- */
        .wa-float {
            position: fixed; bottom: 35px; right: 35px;
            background: #25d366; color: #fff; width: 65px; height: 65px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4); z-index: 100;
            text-decoration: none; transition: 0.5s;
            visibility: hidden; opacity: 0; transform: translateY(100px);
        }
        .wa-float.visible { visibility: visible; opacity: 1; transform: translateY(0); animation: pulseWa 2s infinite; }
        
        @keyframes pulseWa { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }

        .btn-order {
            background: #fff; color: #000; padding: 18px 45px;
            border-radius: 50px; text-decoration: none; font-weight: 800;
            display: none; margin: 30px auto; letter-spacing: 2px; font-size: 0.8rem;
            transition: 0.3s; box-shadow: 0 10px 25px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <section class="hero">
        <div style="z-index: 2;">
            <div class="logo-main">
                <img src="logo-blanco.svg" alt="ECOS Logo">
            </div>
            <h1 style="font-family: 'Montserrat'; letter-spacing: 6px;">ECOS</h1>
            <p style="color:var(--pink); letter-spacing: 4px; font-size: 0.8rem; font-weight: 300;">STRATEGIC ASSET SYSTEMS</p>
        </div>
    </section>

    <section class="services-section">
        <div class="counter-badge" id="selection-text">ELIGE 3 SERVICIOS PARA COTIZAR</div>
        
        <div class="grid-12" id="servicesGrid">
            <div class="service-card" data-name="Fidelización PWA"><h4>Fidelización</h4></div>
            <div class="service-card" data-name="Consultoría Branding"><h4>Branding</h4></div>
            <div class="service-card" data-name="Gestión de Activos"><h4>Activos</h4></div>
            <div class="service-card" data-name="Desarrollo Web Pro"><h4>Web Pro</h4></div>
            <div class="service-card" data-name="Marketing Digital"><h4>Marketing</h4></div>
            <div class="service-card" data-name="Producción de Video"><h4>Audiovisual</h4></div>
            <div class="service-card" data-name="Identidad Visual"><h4>Identidad</h4></div>
            <div class="service-card" data-name="Estrategia Ventas"><h4>Estrategia</h4></div>
            <div class="service-card" data-name="Gestión Eventos"><h4>Eventos</h4></div>
            <div class="service-card" data-name="Publicidad BTL"><h4>Publicidad</h4></div>
            <div class="service-card" data-name="Diseño UI/UX"><h4>UI/UX</h4></div>
            <div class="service-card" data-name="Social Media Plan"><h4>Social Media</h4></div>
        </div>
        
        <a href="#" id="orderBtn" class="btn-order">INICIAR ASESORÍA</a>
    </section>

    <a href="#" class="wa-float" id="waButton" target="_blank">
        <svg width="35" height="35" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.06 3.973L0 16l5.053-1.326A7.817 7.817 0 0 0 7.994 14.521h.005c4.367 0 7.926-3.558 7.93-7.93a7.856 7.856 0 0 0-2.328-5.265zM7.994 13.066h-.005a6.708 6.708 0 0 1-3.111-.767l-.223-.132-3.045.797.81-2.956-.144-.23a6.723 6.723 0 0 1-1.036-3.593c0-3.704 3.015-6.718 6.723-6.718a6.712 6.712 0 0 1 4.752 1.972 6.713 6.713 0 0 1 1.974 4.756c-.004 3.705-3.018 6.72-6.726 6.72zM11.57 9.477c-.19-.094-.1.127-.476-.452-.074-.112-.135-.24-.226-.34-.403-.441-.837-.808-1.356-1.076-.188-.097-.303-.083-.438.067-.136.15-.521.65-.638.783-.117.133-.234.15-.425.055-.19-.095-.802-.296-1.528-.944-.564-.504-.944-1.128-1.055-1.317-.112-.19-.012-.294.082-.388.086-.085.19-.22.285-.33.095-.11.127-.188.19-.312.063-.125.032-.234-.015-.33-.048-.094-.425-1.025-.583-1.405-.154-.37-.31-.32-.425-.326-.108-.005-.233-.006-.358-.006-.125 0-.328.047-.5.234-.172.188-.656.641-.656 1.562 0 .922.672 1.813.766 1.938.094.125 1.32 2.015 3.197 2.82.447.192.795.307 1.067.393.448.143.855.123 1.176.075.358-.053 1.098-.448 1.255-.88.156-.433.156-.805.109-.88-.047-.075-.172-.117-.362-.211z"/>
        </svg>
    </a>

    <footer style="text-align: center; padding: 40px; color: #222; font-size: 0.7rem; letter-spacing: 2px;">
        ORCA STUDIOS • QUITO • COLOMBIA
    </footer>

    <script>
        const selected = new Set();
        const cards = document.querySelectorAll('.service-card');
        const waButton = document.getElementById('waButton');
        const orderBtn = document.getElementById('orderBtn');
        const selectionText = document.getElementById('selection-text');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const name = card.getAttribute('data-name');
                
                if (selected.has(name)) {
                    selected.delete(name);
                    card.classList.remove('selected');
                } else if (selected.size < 3) {
                    selected.add(name);
                    card.classList.add('selected');
                    if (navigator.vibrate) navigator.vibrate(50);
                }

                updateUI();
            });
        });

        function updateUI() {
            const count = selected.size;
            selectionText.innerText = count === 3 ? "¡LISTO! PULSA EL BOTÓN" : `SELECCIONADOS: ${count} DE 3`;
            selectionText.style.borderColor = count === 3 ? "#25d366" : "var(--pink)";
            selectionText.style.color = count === 3 ? "#25d366" : "var(--pink)";
            
            if (count === 3) {
                const services = Array.from(selected).join(', ');
                const msg = encodeURIComponent(`¡Hola ECOS! Me interesa la asesoría para estos 3 servicios: ${services}.`);
                // Número actualizado según tu mensaje
                const finalUrl = `https://wa.me/593979010077?text=${msg}`;
                
                waButton.href = finalUrl;
                waButton.classList.add('visible');
                orderBtn.style.display = 'block';
                orderBtn.href = finalUrl;
            } else {
                waButton.classList.remove('visible');
                orderBtn.style.display = 'none';
            }
        }
    </script>
</body>
</html>
